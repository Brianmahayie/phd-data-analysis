name: Render and Deploy

on:
  schedule:
    - cron: "0 0 * * *"  # Midnight UTC = Midnight Sierra Leone time
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libudunits2-dev libgdal-dev libgeos-dev libproj-dev libmagick++-dev libharfbuzz-dev libfribidi-dev

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::lubridate
            any::knitr
            any::rmarkdown
            any::scales
            any::httr
            any::jsonlite
            any::kableExtra
            any::magick
            any::sf
            any::ggspatial
            any::gridExtra
            any::lemon
            any::openxlsx
            any::readxl
            any::ggrepel
            any::patchwork

      - name: Render site
        run: |
          Rscript -e "rmarkdown::render_site()"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

